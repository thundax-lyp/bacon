server:
  port: ${BACON_SERVER_PORT:8081}

spring:
  application:
    name: bacon-auth-service
  boot:
    admin:
      client:
        enabled: false

bacon:
  runtime:
    mode: micro
  remote:
    upms-base-url: ${BACON_REMOTE_UPMS_BASE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
