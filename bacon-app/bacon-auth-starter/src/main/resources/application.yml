server:
  port: ${BACON_SERVER_PORT:8081}
  servlet:
    context-path: /api

spring:
  application:
    name: bacon-auth-service
  main:
    banner-mode: off
  boot:
    admin:
      client:
        enabled: false

mybatis-plus:
  global-config:
    banner: false

bacon:
  runtime:
    mode: micro
  remote:
    upms-base-url: ${BACON_REMOTE_UPMS_BASE_URL:http://127.0.0.1:8082/api}
    upms:
      provider-token: ${BACON_REMOTE_UPMS_PROVIDER_TOKEN:}
  web:
    internal-api:
      enabled: true
      header-name: X-Bacon-Provider-Token
      token: ${BACON_AUTH_PROVIDER_TOKEN:}
      include-path-patterns:
        - /providers/auth/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
