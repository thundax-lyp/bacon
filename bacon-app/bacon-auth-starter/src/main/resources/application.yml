server:
  port: ${BACON_SERVER_PORT:8081}
  servlet:
    context-path: /api

spring:
  application:
    name: bacon-auth-service
  boot:
    admin:
      client:
        enabled: false

bacon:
  runtime:
    mode: micro
  remote:
    upms-base-url: ${BACON_REMOTE_UPMS_BASE_URL:http://127.0.0.1:8082/api}

management:
  endpoints:
    web:
      exposure:
        include: health,info
