server:
  port: ${BACON_SERVER_PORT:8081}
  servlet:
    context-path: /api

spring:
  application:
    name: bacon-auth-service
  main:
    banner-mode: off
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: ${BACON_NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${BACON_NACOS_REGISTER_ENABLED:true}
        server-addr: ${BACON_NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${BACON_NACOS_NAMESPACE:public}
        group: ${BACON_NACOS_GROUP:DEFAULT_GROUP}
        username: ${BACON_NACOS_USERNAME:nacos}
        password: ${BACON_NACOS_PASSWORD:nacos}
  boot:
    admin:
      client:
        enabled: false

mybatis-plus:
  global-config:
    banner: false

bacon:
  runtime:
    mode: micro
  remote:
    upms-base-url: ${BACON_REMOTE_UPMS_BASE_URL:http://bacon-upms-service/api}
    upms:
      provider-token: ${BACON_REMOTE_UPMS_PROVIDER_TOKEN:}
  web:
    internal-api:
      enabled: true
      header-name: X-Bacon-Provider-Token
      token: ${BACON_AUTH_PROVIDER_TOKEN:}
      include-path-patterns:
        - /providers/auth/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
