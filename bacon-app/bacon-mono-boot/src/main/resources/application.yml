server:
  port: ${BACON_SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: bacon-mono-boot
  main:
    banner-mode: off
  datasource:
    url: ${BACON_DB_URL:jdbc:mysql://127.0.0.1:3306/bacon_sample?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${BACON_DB_USERNAME:}
    password: ${BACON_DB_PASSWORD:}
    driver-class-name: ${BACON_DB_DRIVER:com.mysql.cj.jdbc.Driver}
  data:
    redis:
      host: ${BACON_REDIS_HOST:127.0.0.1}
      port: ${BACON_REDIS_PORT:6379}
      database: ${BACON_REDIS_DATABASE:0}
      password: ${BACON_REDIS_PASSWORD:}
      timeout: ${BACON_REDIS_TIMEOUT:5s}
  boot:
    admin:
      client:
        enabled: false

rocketmq:
  name-server: ${BACON_ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${BACON_ROCKETMQ_PRODUCER_GROUP:bacon-mono-boot-producer}

mybatis-plus:
  global-config:
    banner: false

bacon:
  mq:
    enabled: ${BACON_MQ_ENABLED:true}
    type: ${BACON_MQ_TYPE:ROCKETMQ}
  runtime:
    mode: mono
  inventory:
    repository:
      mode: ${BACON_INVENTORY_REPOSITORY_MODE:strict}
    retry:
      max-attempts: ${BACON_INVENTORY_RETRY_MAX_ATTEMPTS:3}
      initial-backoff-ms: ${BACON_INVENTORY_RETRY_INITIAL_BACKOFF_MS:20}
      max-backoff-ms: ${BACON_INVENTORY_RETRY_MAX_BACKOFF_MS:200}
    audit:
      retry:
        enabled: ${BACON_INVENTORY_AUDIT_RETRY_ENABLED:true}
        fixed-delay-ms: ${BACON_INVENTORY_AUDIT_RETRY_FIXED_DELAY_MS:10000}
        batch-size: ${BACON_INVENTORY_AUDIT_RETRY_BATCH_SIZE:100}
        max-retries: ${BACON_INVENTORY_AUDIT_RETRY_MAX_RETRIES:6}
        base-delay-seconds: ${BACON_INVENTORY_AUDIT_RETRY_BASE_DELAY_SECONDS:30}
        max-delay-seconds: ${BACON_INVENTORY_AUDIT_RETRY_MAX_DELAY_SECONDS:1800}
        lease-seconds: ${BACON_INVENTORY_AUDIT_RETRY_LEASE_SECONDS:60}
      replay-task:
        enabled: ${BACON_INVENTORY_AUDIT_REPLAY_TASK_ENABLED:true}
        fixed-delay-ms: ${BACON_INVENTORY_AUDIT_REPLAY_TASK_FIXED_DELAY_MS:3000}
        claim-size: ${BACON_INVENTORY_AUDIT_REPLAY_TASK_CLAIM_SIZE:2}
        batch-size: ${BACON_INVENTORY_AUDIT_REPLAY_TASK_BATCH_SIZE:20}
        lease-seconds: ${BACON_INVENTORY_AUDIT_REPLAY_TASK_LEASE_SECONDS:60}
  order:
    repository:
      mode: ${BACON_ORDER_REPOSITORY_MODE:strict}
  id:
    generator:
      provider: tinyid
      tiny-id:
        server: ${BACON_TINYID_SERVER:127.0.0.1:9999}
        token: ${BACON_TINYID_TOKEN:tinyid_token}
        connect-timeout: ${BACON_TINYID_CONNECT_TIMEOUT:5s}
        read-timeout: ${BACON_TINYID_READ_TIMEOUT:5s}
      snowflake:
        worker-id: ${BACON_ID_SNOWFLAKE_WORKER_ID:1}
        datacenter-id: ${BACON_ID_SNOWFLAKE_DATACENTER_ID:1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
