server:
  port: ${BACON_SERVER_PORT:8083}
  servlet:
    context-path: /api

spring:
  application:
    name: bacon-order-service
  boot:
    admin:
      client:
        enabled: false

bacon:
  runtime:
    mode: micro
  remote:
    order-base-url: ${BACON_REMOTE_ORDER_BASE_URL:http://127.0.0.1:8083/api}
    order:
      provider-token: ${BACON_REMOTE_ORDER_PROVIDER_TOKEN:}
  web:
    internal-api:
      enabled: true
      header-name: X-Bacon-Provider-Token
      token: ${BACON_ORDER_PROVIDER_TOKEN:}
      include-path-patterns:
        - /providers/orders/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
