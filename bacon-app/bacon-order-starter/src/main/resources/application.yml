server:
  port: ${BACON_SERVER_PORT:8083}
  servlet:
    context-path: /api

spring:
  application:
    name: bacon-order-service
  boot:
    admin:
      client:
        enabled: false

bacon:
  runtime:
    mode: micro
  remote:
    order-base-url: ${BACON_REMOTE_ORDER_BASE_URL:http://localhost:8083/api}

management:
  endpoints:
    web:
      exposure:
        include: health,info
