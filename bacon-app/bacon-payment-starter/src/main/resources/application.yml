server:
  port: ${BACON_SERVER_PORT:8085}
  servlet:
    context-path: /api

spring:
  application:
    name: bacon-payment-service
  main:
    banner-mode: off
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: ${BACON_NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${BACON_NACOS_REGISTER_ENABLED:true}
        server-addr: ${BACON_NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${BACON_NACOS_NAMESPACE:public}
        group: ${BACON_NACOS_GROUP:DEFAULT_GROUP}
        username: ${BACON_NACOS_USERNAME:nacos}
        password: ${BACON_NACOS_PASSWORD:nacos}

mybatis-plus:
  global-config:
    banner: false

bacon:
  runtime:
    mode: micro
  remote:
    payment:
      provider-token: ${BACON_REMOTE_PAYMENT_PROVIDER_TOKEN:}
  web:
    internal-api:
      enabled: true
      header-name: X-Bacon-Provider-Token
      token: ${BACON_PAYMENT_PROVIDER_TOKEN:}
      include-path-patterns:
        - /providers/payment/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
