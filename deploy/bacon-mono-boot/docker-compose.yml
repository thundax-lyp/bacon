services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - bacon-mono-boot
    ports:
      - "${BACON_PUBLIC_HTTP_PORT:-18080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - public
      - backend

  bacon-mono-boot:
    image: eclipse-temurin:17-jre
    working_dir: /app
    command: ["sh", "-c", "java $JAVA_OPTS -jar /app/app.jar"]
    depends_on:
      - mysql
      - redis
      - minio
      - rocketmq-nameserver
      - rocketmq-broker
    environment:
      BACON_SERVER_PORT: 8080
      BACON_DB_URL: "${BACON_DB_URL}"
      BACON_DB_USERNAME: "${BACON_DB_USERNAME}"
      BACON_DB_PASSWORD: "${BACON_DB_PASSWORD}"
      BACON_DB_DRIVER: "${BACON_DB_DRIVER}"
      BACON_REDIS_URL: "${BACON_REDIS_URL}"
      BACON_REDIS_PASSWORD: "${BACON_REDIS_PASSWORD}"
      BACON_REDIS_TIMEOUT: "${BACON_REDIS_TIMEOUT}"
      BACON_MQ_ENABLED: "${BACON_MQ_ENABLED}"
      BACON_MQ_TYPE: "${BACON_MQ_TYPE}"
      BACON_ROCKETMQ_NAME_SERVER: "${BACON_ROCKETMQ_NAME_SERVER}"
      BACON_ROCKETMQ_PRODUCER_GROUP: "${BACON_ROCKETMQ_PRODUCER_GROUP}"
      BACON_INTERNAL_API_TOKEN: "${BACON_INTERNAL_API_TOKEN}"
      BACON_TINYID_SERVER: "${BACON_TINYID_SERVER}"
      BACON_TINYID_TOKEN: "${BACON_TINYID_TOKEN}"
      BACON_STORAGE_TYPE: "${BACON_STORAGE_TYPE}"
      BACON_COMMON_OSS_ENABLED: "${BACON_STORAGE_OSS_ENABLED}"
      BACON_COMMON_OSS_TYPE: "${BACON_STORAGE_OSS_KIND}"
      BACON_COMMON_OSS_ENDPOINT: "${BACON_STORAGE_OSS_ENDPOINT}"
      BACON_COMMON_OSS_PUBLIC_BASE_URL: "${BACON_STORAGE_OSS_PUBLIC_BASE_URL}"
      BACON_COMMON_OSS_BUCKET_NAME: "${BACON_STORAGE_OSS_BUCKET_NAME}"
      BACON_COMMON_OSS_ACCESS_KEY: "${BACON_STORAGE_OSS_ACCESS_KEY}"
      BACON_COMMON_OSS_SECRET_KEY: "${BACON_STORAGE_OSS_SECRET_KEY}"
      BACON_COMMON_OSS_REGION: "${BACON_STORAGE_OSS_REGION}"
      BACON_COMMON_OSS_PATH_STYLE_ACCESS: "${BACON_STORAGE_OSS_PATH_STYLE_ACCESS}"
      JAVA_OPTS: "${JAVA_OPTS}"
    volumes:
      - "${BACON_MONO_JAR}:/app/app.jar:ro"
    networks:
      - backend

  mysql:
    image: mysql:8.4
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    volumes:
      - mono-mysql-data:/var/lib/mysql
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - mono-redis-data:/data
    networks:
      - backend

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${BACON_STORAGE_OSS_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${BACON_STORAGE_OSS_SECRET_KEY}"
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - mono-minio-data:/data
    networks:
      - backend

  rocketmq-nameserver:
    image: apache/rocketmq:5.3.2
    command: ["sh", "mqnamesrv"]
    networks:
      - backend

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    command: ["sh", "mqbroker", "-n", "rocketmq-nameserver:9876", "--enable-proxy"]
    depends_on:
      - rocketmq-nameserver
    networks:
      - backend

networks:
  public:
  backend:

volumes:
  mono-mysql-data:
  mono-redis-data:
  mono-minio-data:
