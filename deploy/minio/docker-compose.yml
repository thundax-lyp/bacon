version: "3.8"

services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: bacon-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: baconminio
      MINIO_ROOT_PASSWORD: baconminio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data:
